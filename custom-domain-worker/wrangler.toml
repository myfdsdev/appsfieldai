name = "custom-domain-worker"
main = "src/index.js"
compatibility_date = "2026-07-01"

# KV: hostname → tenant mapping.
# Create with:  npx wrangler kv namespace create DOMAINS
#          and: npx wrangler kv namespace create DOMAINS --preview
# then paste the ids below.
[[kv_namespaces]]
binding = "DOMAINS"
id = "PRODUCTION_KV_ID"
preview_id = "PREVIEW_KV_ID"

[vars]
# The appsfieldai.com Cloudflare zone id (dashboard → Overview).
ZONE_ID = "your_zone_id"
# Origins (Render/Base44 backends). Only these are ever proxied to.
APP_ORIGIN = "https://app.appsfieldai.com"
BASE44_ORIGIN = "https://share-saas-hq.base44.app"
ADMIN_ORIGIN = "https://app.appsfieldai.com"
# The CNAME value customers point their domain at (your SaaS fallback origin host).
CNAME_TARGET = "custom.appsfieldai.com"

# Secrets — set with `npx wrangler secret put NAME` (NEVER commit these):
#   CLOUDFLARE_API_TOKEN  — token scoped to the zone: SSL and Certificates: Edit + Zone: Read
#   VERIFICATION_SECRET   — bearer token the AppsfieldAI dashboard sends for admin calls
#   ORIGIN_PROXY_SECRET   — shared secret the origin checks to trust the Worker

# Route: catch ALL traffic on the zone (including customer custom hostnames) → this Worker.
# In the dashboard, add a second route `app.appsfieldai.com/*` → Worker: None so the
# main app is served normally and never proxied through this Worker.
[[routes]]
pattern = "*/*"
zone_name = "appsfieldai.com"
